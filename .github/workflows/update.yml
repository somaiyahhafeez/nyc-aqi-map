name: Update AQI Map

on:
  schedule:
    # every hour
    - cron: "0 * * * *"

  workflow_dispatch:

jobs:
  update:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Download repo
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          pip install -r requirements.txt

      - name: Get AQI data
        env:
          AIRNOW_API_KEY: ${{ secrets.AIRNOW_API_KEY }}
        run: |
          python update.py

      - name: Save new CSV
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          if [ -f data.csv ]; then
            git add data.csv
            git commit -m "Update AQI data" || exit 0
            git push
          else
            echo "No data.csv created"
            exit 1
          fi
